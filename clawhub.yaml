name: snaptidy
version: 2.0.0
description: |
  AI-powered photo & video organizer for macOS. Scan libraries, detect duplicates (SHA-256 exact + pHash perceptual), generate safe move plans with smart priority rules — without ever deleting your originals.
  Supports SQLite storage for 100k+ photos, GPS/camera metadata extraction, auto-categorization (photo/screenshot/wechat/burst/video), macOS Trash mode, and multilingual detection.
  Trigger: "organize my photos", "find duplicate photos", "dedup my library", "tidy photo folder", "整理照片", "去重", "整理相册"
author: chicogong
homepage: https://github.com/chicogong/snaptidy
repository: https://github.com/chicogong/snaptidy
license: MIT
