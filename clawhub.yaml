name: snaptidy
version: 3.14.2
description: |
  Safety-first macOS photo and video organizer. Scan folders or Photos.app, detect exact and perceptual duplicates, assess seven quality dimensions, handle Live Photos and iCloud placeholders, audit integrity, repair metadata, and import from external drives or Android with reviewable plans and recovery guidance.
