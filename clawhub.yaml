name: snaptidy
version: 3.0.0
description: |
  AI-powered photo & video organizer for macOS. Detect duplicates using SHA-256 exact + pHash perceptual + scaled + cross-format (HEIC↔JPEG) + burst detection. Scan file folders or Photos.app library directly. Smart priority rules, Photos.app PyObjC deletion, SQLite storage for 100k+ photos.
  Trigger: "organize my photos", "find duplicate photos", "dedup my library", "tidy photo folder", "整理照片", "去重", "整理相册", "HEIC去重"
author: chicogong
homepage: https://github.com/chicogong/snaptidy
repository: https://github.com/chicogong/snaptidy
license: MIT
skill_file: SKILL.md
compatibility:
