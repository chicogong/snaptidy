name: snaptidy
version: 3.3.0
description: |
  AI-powered photo & video organizer for macOS. Detect duplicates using SHA-256 exact + pHash perceptual + scaled + cross-format (HEIC↔JPEG) + burst detection. Scan file folders or Photos.app library directly. Import from external drives/Android into Photos.app with automatic dedup. Organize by date/category, interactive workflow, HTML thumbnail preview, undo support, iCloud/Android/external drive detection, shared album reading, iCloud sync awareness, 15+ language auto-categorization, smart priority rules, Fast/Safe path confirmation, SQLite storage for 100k+ photos, streaming writes for zero data loss.
  Trigger: "organize my photos", "find duplicate photos", "dedup my library", "tidy photo folder", "import photos", "import from Android", "整理照片", "去重", "整理相册", "HEIC去重", "写真整理", "사진 정리", "按日期整理照片", "organize by date", "导入照片"
author: chicogong
homepage: https://github.com/chicogong/snaptidy
repository: https://github.com/chicogong/snaptidy
license: MIT
