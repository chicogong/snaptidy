<svg viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .th { font: 500 14px -apple-system, BlinkMacSystemFont, sans-serif; fill: #2C2C2A; }
    .ts { font: 400 12px -apple-system, BlinkMacSystemFont, sans-serif; fill: #5F5E5A; }
    .box { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.5; rx: 8; }
  </style>

  <!-- Step 1: Scan -->
  <g>
    <rect x="40" y="60" width="120" height="56" class="box"/>
    <text class="th" x="100" y="82" text-anchor="middle" dominant-baseline="central">Scan</text>
    <text class="ts" x="100" y="100" text-anchor="middle" dominant-baseline="central">Photos &amp; Videos</text>
  </g>
  <rect x="40" y="126" width="120" height="22" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
  <text class="ts" x="100" y="140" text-anchor="middle" dominant-baseline="central" fill="#27500A">Read-only</text>

  <line x1="168" y1="88" x2="198" y1="88" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Find Duplicates -->
  <g>
    <rect x="206" y="50" width="130" height="76" class="box"/>
    <text class="th" x="271" y="72" text-anchor="middle" dominant-baseline="central">Find Dupes</text>
    <text class="ts" x="271" y="90" text-anchor="middle" dominant-baseline="central">SHA-256 exact</text>
    <text class="ts" x="271" y="106" text-anchor="middle" dominant-baseline="central">+ pHash perceptual</text>
    <text class="ts" x="271" y="118" text-anchor="middle" dominant-baseline="central">+ scaled / cross-format</text>
  </g>
  <rect x="206" y="134" width="130" height="22" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
  <text class="ts" x="271" y="148" text-anchor="middle" dominant-baseline="central" fill="#27500A">Read-only</text>

  <line x1="344" y1="88" x2="374" y1="88" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Generate Plan -->
  <g>
    <rect x="382" y="55" width="120" height="66" class="box"/>
    <text class="th" x="442" y="77" text-anchor="middle" dominant-baseline="central">Gen Plan</text>
    <text class="ts" x="442" y="95" text-anchor="middle" dominant-baseline="central">Smart scoring</text>
    <text class="ts" x="442" y="111" text-anchor="middle" dominant-baseline="central">Move plan (CSV)</text>
  </g>
  <rect x="382" y="127" width="120" height="22" rx="4" fill="#EAF3DE" stroke="#97C459" stroke-width="0.3"/>
  <text class="ts" x="442" y="141" text-anchor="middle" dominant-baseline="central" fill="#27500A">Read-only</text>

  <line x1="510" y1="88" x2="540" y1="88" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Review & Apply -->
  <g>
    <rect x="548" y="48" width="120" height="80" rx="8" stroke="#D85A30" stroke-width="0.5" fill="#FAECE7"/>
    <text class="th" x="608" y="70" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Review &amp;</text>
    <text class="th" x="608" y="86" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Apply</text>
    <text class="ts" x="608" y="104" text-anchor="middle" dominant-baseline="central" fill="#993C1D">You confirm first,</text>
    <text class="ts" x="608" y="118" text-anchor="middle" dominant-baseline="central" fill="#993C1D">then it moves</text>
  </g>
  <rect x="548" y="134" width="120" height="28" rx="4" fill="#FCEBEB" stroke="#F09595" stroke-width="0.3"/>
  <text class="ts" x="608" y="150" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Move / Trash / Undo</text>

  <!-- Bottom labels -->
  <text class="ts" x="100" y="178" text-anchor="middle" fill="#888780">Step 1</text>
  <text class="ts" x="271" y="178" text-anchor="middle" fill="#888780">Step 2</text>
  <text class="ts" x="442" y="178" text-anchor="middle" fill="#888780">Step 3</text>
  <text class="ts" x="608" y="178" text-anchor="middle" fill="#888780">Step 4</text>
</svg>